name: NSE Delivery Data Automation

on:
  schedule:
    # यह टाइमर रोज़ सोमवार से शुक्रवार भारतीय समयानुसार शाम 7:30 बजे (14:00 UTC) चलेगा
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # इससे आप जब चाहें मैन्युअली भी 'Run' बटन दबाकर चला सकते हैं

jobs:
  run-automation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v3

      - name: Setup Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas gspread google-auth

      - name: Execute Script and Update Sheets
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python script.py
